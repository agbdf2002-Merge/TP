name: Register Validation

on:
  pull_request:
    paths:
      - 'registers/**'
      - 'governance/evidence/**'
      - 'tools/validation/**'
      - '.github/workflows/register-validation.yml'
  workflow_dispatch:

jobs:
  validate-registers:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Validate governance registers
        run: python tools/validation/validate_governance_registers.py
